name: Release Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Analyze, test, build & sign release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache Flutter/Gradle/Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_ROOT }}/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      # This repo intentionally does not commit the binary
      # `gradle-wrapper.jar` (it can't be produced from source). CI
      # provisions Gradle directly and generates the wrapper fresh —
      # a standard, reproducible alternative to checking in a binary.
      # For local builds, run the same two commands once from android/.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.6

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.6 --distribution-type all

      - name: Run analyzer
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing — cannot produce a signed release build."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$STORE_PASSWORD" ]; then
            echo "::error::One or more signing secrets (KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD) are missing."
            exit 1
          fi
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK (signed)
        run: flutter build apk --release

      - name: Build release App Bundle (signed)
        run: flutter build appbundle --release

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME"/build-tools | sort -V | tail -n 1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: our-story-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: our-story-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create/update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true

      - name: Clean up signing material
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks android/key.properties
