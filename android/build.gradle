allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Some plugins (e.g. video_thumbnail) ship their own android/build.gradle
// pinned to an old compileSdk, which fails AAR metadata checks against
// newer androidx dependencies pulled in by other plugins. Force every
// Android sub-module to compile against the same SDK as the app itself.
// (plugins.withId is used instead of afterEvaluate because ":app" is
// already evaluated by the time this block runs, due to
// evaluationDependsOn above — afterEvaluate would throw on it.)
subprojects {
    plugins.withId("com.android.library") {
        android {
            compileSdk = 36
        }
    }
    plugins.withId("com.android.application") {
        android {
            compileSdk = 36
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
