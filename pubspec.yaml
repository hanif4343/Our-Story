name: our_story
description: "Our Story – Hanif ❤️ Santona. A cinematic anniversary love-story app."
publish_to: 'none'
version: 1.6.0+7

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (MVVM ViewModels)
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Local storage (no Firebase, fully offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Media pipeline — Creator Mode's photo/video/music/voice system
  image_picker: ^1.1.2
  video_player: ^2.9.1
  audioplayers: ^6.0.0
  record: ^6.2.0
  video_thumbnail: ^0.5.3
  permission_handler: ^11.3.1
  file_picker: ^8.1.2
  cached_network_image: ^3.3.1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  crypto: ^3.0.3
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

  # Custom romantic typography — drop matching .ttf files into assets/fonts
  # and this block will activate them (see README "Fonts" section).
  # fonts:
  #   - family: PlayfairDisplay
  #     fonts:
  #       - asset: assets/fonts/PlayfairDisplay-Regular.ttf
  #       - asset: assets/fonts/PlayfairDisplay-Bold.ttf
  #         weight: 700
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
